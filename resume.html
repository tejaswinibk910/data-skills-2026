<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tejaswini BK - Resume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #fafafa;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(20, 184, 166, 0.3);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(90deg, #14b8a6, #0891b2, #06b6d4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 8s ease infinite;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(20, 184, 166, 0.3);
            color: #fafafa;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(20, 184, 166, 0.6);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(90deg, #14b8a6, #06b6d4);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(20, 184, 166, 0.4);
        }

        .pdf-container {
            flex: 1;
            width: 100%;
            height: calc(100vh - 80px);
            background: #1a1a1a;
        }

        .pdf-embed {
            width: 100%;
            height: 100%;
            border: none;
        }

        .fallback-message {
            display: none;
            text-align: center;
            padding: 3rem;
            color: rgba(250, 250, 250, 0.7);
        }

        .fallback-message a {
            color: #14b8a6;
            text-decoration: none;
            font-weight: 600;
        }

        .fallback-message a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .header-buttons {
                width: 100%;
                justify-content: center;
            }

            .btn {
                font-size: 0.85rem;
                padding: 0.6rem 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Resume</h1>
        <div class="header-buttons">
            <a href="index.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i>
                Back to Portfolio
            </a>
            <a href="Tejaswini_BK_Resume.pdf" download="Tejaswini_BK_Resume.pdf" class="btn btn-primary">
                <i class="fas fa-download"></i>
                Download PDF
            </a>
        </div>
    </div>

    <div class="pdf-container">
        <embed 
            src="Tejaswini_BK_Resume.pdf" 
            type="application/pdf" 
            class="pdf-embed"
            title="Tejaswini BK Resume"
        />
        <div class="fallback-message">
            <p>Your browser doesn't support embedded PDFs.</p>
            <p><a href="Tejaswini_BK_Resume.pdf" download>Click here to download the PDF</a></p>
        </div>
    </div>

    <script>
        // Fallback for browsers that don't support PDF embedding
        const pdfEmbed = document.querySelector('.pdf-embed');
        const fallbackMessage = document.querySelector('.fallback-message');
        
        pdfEmbed.addEventListener('error', function() {
            pdfEmbed.style.display = 'none';
            fallbackMessage.style.display = 'block';
        });
    </script>
</body>
</html>
